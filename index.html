<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MiraMira Core Player</title>
<audio id="radioAudio" preload="auto">
  <source src="https://radio.radiomiramira.com/listen/radiomiramira/radio.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById('radioAudio');
let isPlaying = false;

// PLAY / PAUSE
function play() {
  audio.play().then(() => { isPlaying = true; sendState(); })
       .catch(()=>{});
}
function pause() { audio.pause(); isPlaying = false; sendState(); }
function toggle() { isPlaying ? pause() : play(); }

// VOLUME
function setVolume(v) { audio.volume = v / 100; }

// SEND STATE TO PARENT
function sendState() {
  window.parent.postMessage({ type: 'PARENT_STATE', playing: isPlaying }, '*');
}

// RECEIVE COMMANDS FROM PARENT
window.addEventListener('message', (e) => {
  const d = e.data; if (!d?.type) return;
  if (d.type === 'RADIO_CMD_TOGGLE') toggle();
  if (d.type === 'RADIO_CMD_VOLUME') setVolume(d.volume);
});

// AUTO RESUME
if (sessionStorage.getItem('radio_playing') === '1') play();

audio.addEventListener('play', () => sessionStorage.setItem('radio_playing','1'));
audio.addEventListener('pause', () => sessionStorage.removeItem('radio_playing'));
</script>
</head>
<body style="margin:0"></body>
</html>
