<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 72px;
    overflow: hidden;
    background: transparent;
    font-family: 'Space Mono', monospace;
  }

  .radio-bar {
    position: relative;
    width: 100%;
    height: 72px;
    background: #fafaf8;
    border-top: 1px solid #e8e6e0;
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 0;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.06);
    cursor: pointer;
  }

  .radio-bar::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    opacity: 0.4;
  }

  .radio-section-station {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 160px;
    flex-shrink: 0;
  }

  .radio-station-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #c8c4bc;
    flex-shrink: 0;
    transition: background 0.4s;
  }

  .radio-bar.playing .radio-station-dot {
    background: #1a1a1a;
    animation: radio-blink 2.2s ease-in-out infinite;
  }

  @keyframes radio-blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.25; }
  }

  .radio-station-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: #b0aca4;
    text-transform: uppercase;
    line-height: 1;
    margin-bottom: 3px;
  }

  .radio-station-name {
    font-size: 12px;
    font-weight: 700;
    color: #1a1a1a;
    letter-spacing: -0.01em;
    line-height: 1;
  }

  .radio-div {
    width: 1px; height: 32px;
    background: #e4e2dc;
    margin: 0 20px;
    flex-shrink: 0;
  }

  .radio-play-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: #1a1a1a;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    position: relative;
    z-index: 2;
  }

  .radio-play-btn:hover { background: #333; transform: scale(1.06); }
  .radio-play-btn:active { transform: scale(0.97); }
  .radio-play-btn svg { width: 16px; height: 16px; fill: #fafaf8; }

  .radio-section-live {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
    overflow: hidden;
  }

  .radio-artwork {
    width: 40px; height: 40px;
    border-radius: 4px;
    background: #e8e6e0;
    flex-shrink: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .radio-artwork img { width: 100%; height: 100%; object-fit: cover; }
  .radio-artwork-placeholder svg { width: 18px; height: 18px; fill: #b0aca4; }

  .radio-visualizer {
    display: flex;
    align-items: center;
    gap: 2.5px;
    height: 24px;
    flex-shrink: 0;
  }

  .radio-bar-vis {
    width: 2.5px; height: 4px;
    background: #d8d5cf;
    border-radius: 2px;
    transition: background 0.3s;
  }

  .radio-bar.playing .radio-bar-vis { background: #1a1a1a; }
  .radio-bar.playing .radio-bar-vis:nth-child(1)  { animation: rw 1.0s ease-in-out infinite 0.00s; }
  .radio-bar.playing .radio-bar-vis:nth-child(2)  { animation: rw 0.8s ease-in-out infinite 0.11s; }
  .radio-bar.playing .radio-bar-vis:nth-child(3)  { animation: rw 1.2s ease-in-out infinite 0.05s; }
  .radio-bar.playing .radio-bar-vis:nth-child(4)  { animation: rw 0.9s ease-in-out infinite 0.22s; }
  .radio-bar.playing .radio-bar-vis:nth-child(5)  { animation: rw 1.1s ease-in-out infinite 0.15s; }
  .radio-bar.playing .radio-bar-vis:nth-child(6)  { animation: rw 0.7s ease-in-out infinite 0.30s; }
  .radio-bar.playing .radio-bar-vis:nth-child(7)  { animation: rw 1.3s ease-in-out infinite 0.08s; }
  .radio-bar.playing .radio-bar-vis:nth-child(8)  { animation: rw 1.0s ease-in-out infinite 0.25s; }

  @keyframes rw {
    0%, 100% { height: 3px; }
    50% { height: 20px; }
  }

  .radio-np-wrap { min-width: 0; flex: 1; overflow: hidden; }

  .radio-np-label {
    font-size: 9px;
    letter-spacing: 0.18em;
    color: #b0aca4;
    text-transform: uppercase;
    margin-bottom: 2px;
    white-space: nowrap;
  }

  .radio-np-title {
    font-size: 11px;
    font-weight: 700;
    color: #1a1a1a;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .radio-np-sub {
    font-size: 10px;
    color: #888480;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .radio-live-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    background: #f0ede8;
    border: 1px solid #e4e2dc;
    border-radius: 100px;
    padding: 4px 10px;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.4s, transform 0.4s;
    flex-shrink: 0;
  }

  .radio-bar.playing .radio-live-pill { opacity: 1; transform: translateY(0); }

  .radio-live-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #1a1a1a;
    animation: radio-blink 2s ease-in-out infinite;
  }

  .radio-live-text {
    font-size: 8px;
    letter-spacing: 0.15em;
    color: #1a1a1a;
    text-transform: uppercase;
  }

  .radio-open-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
    color: #b0aca4;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    transition: color 0.2s;
  }

  .radio-bar:hover .radio-open-btn { color: #1a1a1a; }

  .radio-open-btn svg {
    width: 16px; height: 16px;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    fill: none;
  }

  .radio-section-volume {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .radio-vol-icon svg { width: 14px; height: 14px; fill: #b0aca4; display: block; }

  .radio-vol-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 90px; height: 2px;
    background: linear-gradient(to right, #1a1a1a 80%, #d8d5cf 80%);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  .radio-vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 11px; height: 11px;
    border-radius: 50%;
    background: #1a1a1a;
    cursor: pointer;
    transition: transform 0.15s;
  }

  .radio-vol-slider::-webkit-slider-thumb:hover { transform: scale(1.4); }

  /* ── Mobile ── */
  @media (max-width: 640px) {
    .radio-bar { padding: 0 14px; height: 64px; }
    html, body { height: 64px; }
    .radio-div { margin: 0 12px; }
    .radio-section-station { min-width: 0; }
    .radio-station-name { font-size: 11px; }
    .radio-section-volume { display: none; }
    .radio-live-pill { display: none; }
    .radio-visualizer { display: none; }
    .radio-artwork { width: 34px; height: 34px; }
    .radio-div:nth-of-type(3) { display: none; }
    .radio-open-btn span { display: none; }
  }
</style>

<div class="radio-bar" id="radioBar" onclick="radioHandleBarClick(event)">
  <div class="radio-section-station">
    <div class="radio-station-dot"></div>
    <div>
      <div class="radio-station-label">Radio</div>
      <div class="radio-station-name">Radio MiraMira</div>
    </div>
  </div>

  <div class="radio-div"></div>

  <button class="radio-play-btn" id="radioPlayBtn" aria-label="Play / Pause">
    <svg id="radioIconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    <svg id="radioIconPause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
  </button>

  <div class="radio-div"></div>

  <div class="radio-section-live">
    <div class="radio-artwork" id="radioArtwork">
      <div class="radio-artwork-placeholder" id="radioArtworkPlaceholder">
        <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
      </div>
    </div>

    <div class="radio-visualizer" id="radioVisualizer"></div>

    <div class="radio-np-wrap">
      <div class="radio-np-label">À l'antenne</div>
      <div class="radio-np-title" id="radioNpTitle">Appuie sur play pour écouter</div>
      <div class="radio-np-sub" id="radioNpSub"></div>
    </div>
  </div>

  <div class="radio-live-pill">
    <div class="radio-live-dot"></div>
    <span class="radio-live-text">Live</span>
  </div>

  <div class="radio-div"></div>

  <div class="radio-open-btn" id="radioOpenBtn">
    <span>Ouvrir</span>
    <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
  </div>

  <div class="radio-div"></div>

  <div class="radio-section-volume" onclick="event.stopPropagation()">
    <span class="radio-vol-icon"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg></span>
    <input type="range" class="radio-vol-slider" id="radioVolSlider" min="0" max="100" value="80" oninput="radioSetVolume(this.value)">
  </div>
</div>

<audio id="radioAudio" preload="auto">
  <source src="https://radio.radiomiramira.com/listen/radiomiramira/radio.mp3" type="audio/mpeg">
</audio>

<script>
  const radioVis = document.getElementById('radioVisualizer');
  for (let i = 0; i < 8; i++) {
    const b = document.createElement('div'); b.className = 'radio-bar-vis'; radioVis.appendChild(b);
  }

  const radioAudio   = document.getElementById('radioAudio');
  const radioBar     = document.getElementById('radioBar');
  let radioPlaying   = false;
  let radioNpInterval = null;
  let radioCurrentArt = '';
  let radioCurrentData = null;

  const savedVol = parseFloat(sessionStorage.getItem('radio_volume') || '0.8');
  radioAudio.volume = savedVol;
  const slider = document.getElementById('radioVolSlider');
  slider.value = savedVol * 100;
  slider.style.background = `linear-gradient(to right, #1a1a1a ${savedVol*100}%, #d8d5cf ${savedVol*100}%)`;

  if (sessionStorage.getItem('radio_playing') === '1') radioAudio.load();

  function radioFetchNowPlaying() {
    fetch('https://radio.radiomiramira.com/api/nowplaying/radiomiramira')
      .then(r => r.json())
      .then(data => {
        if (!data || !data.now_playing) return;
        const song   = data.now_playing.song;
        const title  = song.title  || '';
        const artist = song.artist || '';
        const album  = song.album  || '';
        const sub    = [artist, album].filter(Boolean).join(' — ');
        const art    = song.art || '';

        document.getElementById('radioNpTitle').textContent = title || 'En cours...';
        document.getElementById('radioNpSub').textContent   = sub;

        radioCurrentData = { title, sub, art, playing: radioPlaying };

        if (art && art !== radioCurrentArt) {
          radioCurrentArt = art;
          const artwork = document.getElementById('radioArtwork');
          const ph      = document.getElementById('radioArtworkPlaceholder');
          let img = artwork.querySelector('img');
          if (!img) { img = document.createElement('img'); artwork.appendChild(img); }
          img.src = art;
          img.onload  = () => { if (ph) ph.style.display = 'none'; };
          img.onerror = () => { if (ph) ph.style.display = ''; };
        }

        /* Envoie les infos à l'overlay dans la page parente */
        window.parent.postMessage({ type: 'RADIO_NOW_PLAYING', title, sub, art, playing: radioPlaying }, '*');
      })
      .catch(() => {});
  }

  function radioUpdateUI(playing) {
    document.getElementById('radioIconPlay').style.display  = playing ? 'none' : '';
    document.getElementById('radioIconPause').style.display = playing ? '' : 'none';
    radioBar.classList.toggle('playing', playing);
    window.parent.postMessage({ type: 'RADIO_STATE', playing }, '*');
  }

  function radioStartPlaying() {
    radioAudio.play().then(() => {
      radioPlaying = true;
      radioUpdateUI(true);
      radioFetchNowPlaying();
      clearInterval(radioNpInterval);
      radioNpInterval = setInterval(radioFetchNowPlaying, 5000);
      sessionStorage.setItem('radio_playing', '1');
    }).catch(() => {
      radioAudio.load();
      radioAudio.play().then(() => {
        radioPlaying = true;
        radioUpdateUI(true);
        radioFetchNowPlaying();
        clearInterval(radioNpInterval);
        radioNpInterval = setInterval(radioFetchNowPlaying, 5000);
        sessionStorage.setItem('radio_playing', '1');
      }).catch(() => {
        document.getElementById('radioNpTitle').textContent = '⚠️ Stream indisponible';
        sessionStorage.removeItem('radio_playing');
      });
    });
  }

  function radioTogglePlay() {
    if (radioPlaying) {
      radioAudio.pause();
      radioPlaying = false;
      radioUpdateUI(false);
      document.getElementById('radioNpTitle').textContent = 'En pause';
      document.getElementById('radioNpSub').textContent   = '';
      clearInterval(radioNpInterval);
      sessionStorage.removeItem('radio_playing');
    } else {
      radioAudio.load();
      radioStartPlaying();
    }
  }

  function radioSetVolume(v) {
    radioAudio.volume = v / 100;
    sessionStorage.setItem('radio_volume', v / 100);
    slider.value = v;
    slider.style.background = `linear-gradient(to right, #1a1a1a ${v}%, #d8d5cf ${v}%)`;
    window.parent.postMessage({ type: 'RADIO_VOLUME', v: parseFloat(v) }, '*');
  }

  function radioHandleBarClick(e) {
    if (e.target.closest('#radioPlayBtn') || e.target.closest('.radio-section-volume')) return;
    window.parent.postMessage({ type: 'RADIO_OPEN_OVERLAY' }, '*');
  }

  document.getElementById('radioPlayBtn').addEventListener('click', e => {
    e.stopPropagation();
    radioTogglePlay();
  });

  /* Écoute les commandes venant de l'overlay (page parente) */
  window.addEventListener('message', e => {
    if (e.data.type === 'RADIO_CMD_TOGGLE') radioTogglePlay();
    if (e.data.type === 'RADIO_CMD_VOLUME') {
      radioAudio.volume = e.data.v / 100;
      sessionStorage.setItem('radio_volume', e.data.v / 100);
    }
    if (e.data.type === 'RADIO_CMD_GET_STATE') {
      window.parent.postMessage({
        type: 'RADIO_NOW_PLAYING',
        title: document.getElementById('radioNpTitle').textContent,
        sub:   document.getElementById('radioNpSub').textContent,
        art:   radioCurrentArt,
        playing: radioPlaying
      }, '*');
    }
  });

  if (sessionStorage.getItem('radio_playing') === '1') {
    setTimeout(radioStartPlaying, 200);
  }
</script>
