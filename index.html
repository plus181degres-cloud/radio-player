<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 72px;
    overflow: hidden;
    background: #fafaf8;
    font-family: 'Space Mono', monospace;
  }

  .radio-bar {
    position: relative;
    width: 100%;
    height: 72px;
    background: #fafaf8;
    border-top: 2px solid #1a1a1a;
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 0;
    cursor: pointer;
  }

  /* Station */
  .radio-station {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    min-width: 160px;
  }

  .radio-station-dot {
    width: 7px; height: 7px;
    background: #c8c4bc;
    flex-shrink: 0;
    transition: background 0.3s;
  }

  .radio-bar.playing .radio-station-dot {
    background: #1a1a1a;
    animation: rblink 2s ease-in-out infinite;
  }

  @keyframes rblink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  .radio-station-label {
    font-size: 8px;
    letter-spacing: 0.22em;
    color: #b0aca4;
    text-transform: uppercase;
    line-height: 1;
    margin-bottom: 3px;
  }

  .radio-station-name {
    font-size: 11px;
    font-weight: 700;
    color: #1a1a1a;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    line-height: 1;
  }

  .radio-sep {
    width: 1px; height: 36px;
    background: #1a1a1a;
    opacity: 0.12;
    margin: 0 20px;
    flex-shrink: 0;
  }

  /* Bouton play — carré coins droits */
  .radio-play-btn {
    width: 40px; height: 40px;
    border-radius: 0;
    background: #1a1a1a;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
    position: relative;
    z-index: 2;
  }

  .radio-play-btn:hover { background: #333; }
  .radio-play-btn:active { transform: scale(0.95); }
  .radio-play-btn svg { width: 15px; height: 15px; fill: #fafaf8; }

  /* Artwork + infos */
  .radio-live {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 14px;
    min-width: 0;
  }

  .radio-artwork {
    width: 42px; height: 42px;
    background: #e8e6e0;
    flex-shrink: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(0,0,0,0.08);
  }

  .radio-artwork img { width: 100%; height: 100%; object-fit: cover; display: none; }
  .radio-artwork svg { width: 18px; height: 18px; fill: #b0aca4; }

  /* Visualizer */
  .radio-vis {
    display: flex;
    align-items: center;
    gap: 2px;
    height: 24px;
    flex-shrink: 0;
  }

  .radio-vis-bar {
    width: 2px; height: 3px;
    background: #d0cdc7;
  }

  .radio-bar.playing .radio-vis-bar { background: #1a1a1a; }
  .radio-bar.playing .radio-vis-bar:nth-child(1)  { animation: rwave 1.0s ease-in-out infinite 0.00s; }
  .radio-bar.playing .radio-vis-bar:nth-child(2)  { animation: rwave 0.8s ease-in-out infinite 0.11s; }
  .radio-bar.playing .radio-vis-bar:nth-child(3)  { animation: rwave 1.2s ease-in-out infinite 0.05s; }
  .radio-bar.playing .radio-vis-bar:nth-child(4)  { animation: rwave 0.9s ease-in-out infinite 0.22s; }
  .radio-bar.playing .radio-vis-bar:nth-child(5)  { animation: rwave 1.1s ease-in-out infinite 0.15s; }
  .radio-bar.playing .radio-vis-bar:nth-child(6)  { animation: rwave 0.7s ease-in-out infinite 0.30s; }
  .radio-bar.playing .radio-vis-bar:nth-child(7)  { animation: rwave 1.3s ease-in-out infinite 0.08s; }
  .radio-bar.playing .radio-vis-bar:nth-child(8)  { animation: rwave 1.0s ease-in-out infinite 0.25s; }
  .radio-bar.playing .radio-vis-bar:nth-child(9)  { animation: rwave 0.8s ease-in-out infinite 0.13s; }
  .radio-bar.playing .radio-vis-bar:nth-child(10) { animation: rwave 1.2s ease-in-out infinite 0.35s; }
  .radio-bar.playing .radio-vis-bar:nth-child(11) { animation: rwave 0.9s ease-in-out infinite 0.04s; }
  .radio-bar.playing .radio-vis-bar:nth-child(12) { animation: rwave 1.1s ease-in-out infinite 0.19s; }

  @keyframes rwave { 0%,100%{height:3px} 50%{height:20px} }

  .radio-np { min-width: 0; }

  .radio-np-label {
    font-size: 8px;
    letter-spacing: 0.2em;
    color: #b0aca4;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .radio-np-title {
    font-size: 11px;
    font-weight: 700;
    color: #1a1a1a;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-transform: uppercase;
    letter-spacing: 0.02em;
  }

  .radio-np-sub {
    font-size: 10px;
    color: #888480;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 1px;
  }

  /* Live pill */
  .radio-live-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    border: 1px solid #1a1a1a;
    padding: 4px 10px;
    opacity: 0;
    transition: opacity 0.4s;
    flex-shrink: 0;
  }

  .radio-bar.playing .radio-live-pill { opacity: 1; }

  .radio-live-dot {
    width: 5px; height: 5px;
    background: #1a1a1a;
    animation: rblink 2s ease-in-out infinite;
  }

  .radio-live-text {
    font-size: 8px;
    letter-spacing: 0.2em;
    color: #1a1a1a;
    text-transform: uppercase;
  }

  /* Ouvrir */
  .radio-open-hint {
    font-size: 8px;
    letter-spacing: 0.18em;
    color: #b0aca4;
    text-transform: uppercase;
    flex-shrink: 0;
    margin-left: 4px;
    transition: color 0.2s;
  }

  .radio-bar:hover .radio-open-hint { color: #1a1a1a; }

  .radio-chevron {
    width: 18px; height: 18px;
    fill: none;
    stroke: #c8c4bc;
    stroke-width: 2;
    stroke-linecap: square;
    stroke-linejoin: miter;
    flex-shrink: 0;
    margin-left: 6px;
    transition: stroke 0.2s;
  }

  .radio-bar:hover .radio-chevron { stroke: #1a1a1a; }

  /* Volume */
  .radio-vol-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: 20px;
    flex-shrink: 0;
  }

  .radio-vol-wrap svg { width: 14px; height: 14px; fill: #b0aca4; }

  .radio-vol-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 90px; height: 2px;
    background: linear-gradient(to right, #1a1a1a 80%, #d8d5cf 80%);
    border-radius: 0;
    outline: none;
    cursor: pointer;
  }

  .radio-vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px; height: 10px;
    border-radius: 0;
    background: #1a1a1a;
    cursor: pointer;
  }

  @media (max-width: 640px) {
    .radio-bar { padding: 0 14px; }
    .radio-station { min-width: 100px; }
    .radio-sep { margin: 0 12px; }
    .radio-vol-wrap { display: none; }
    .radio-live-pill { display: none; }
    .radio-vis { display: none; }
    .radio-open-hint { display: none; }
    .radio-chevron { display: none; }
    .radio-artwork { width: 36px; height: 36px; }
  }
</style>

<div class="radio-bar" id="radioBar" onclick="radioBarClick(event)">

  <div class="radio-station">
    <div class="radio-station-dot"></div>
    <div>
      <div class="radio-station-label">Radio</div>
      <div class="radio-station-name">MiraMira</div>
    </div>
  </div>

  <div class="radio-sep"></div>

  <button class="radio-play-btn" id="radioPlayBtn" aria-label="Play / Pause">
    <svg id="rIconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    <svg id="rIconPause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
  </button>

  <div class="radio-sep"></div>

  <div class="radio-live">
    <div class="radio-artwork" id="rArtwork">
      <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
    </div>

    <div class="radio-vis" id="rVis"></div>

    <div class="radio-np">
      <div class="radio-np-label">À l'antenne</div>
      <div class="radio-np-title" id="rTitle">Appuie sur play</div>
      <div class="radio-np-sub" id="rSub"></div>
    </div>
  </div>

  <div class="radio-live-pill">
    <div class="radio-live-dot"></div>
    <span class="radio-live-text">Live</span>
  </div>

  <div class="radio-sep"></div>

  <span class="radio-open-hint">Ouvrir</span>
  <svg class="radio-chevron" viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>

  <div class="radio-vol-wrap" onclick="event.stopPropagation()">
    <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
    <input type="range" class="radio-vol-slider" id="rVolSlider" min="0" max="100" value="80" oninput="radioSetVol(this.value)">
  </div>

</div>

<audio id="rAudio" preload="auto">
  <source src="https://radio.radiomiramira.com/listen/radiomiramira/radio.mp3" type="audio/mpeg">
</audio>

<script>
  /* Visualizer */
  const rVis = document.getElementById('rVis');
  for (let i = 0; i < 12; i++) {
    const b = document.createElement('div'); b.className = 'radio-vis-bar'; rVis.appendChild(b);
  }

  const rAudio  = document.getElementById('rAudio');
  const rBar    = document.getElementById('radioBar');
  let rPlaying  = false;
  let rInterval = null;
  let rCurrentArt = '';

  /* Volume restore */
  const savedVol = parseFloat(sessionStorage.getItem('rmm_vol') || '0.8');
  rAudio.volume  = savedVol;
  const rSlider  = document.getElementById('rVolSlider');
  rSlider.value  = savedVol * 100;
  rSlider.style.background = `linear-gradient(to right,#1a1a1a ${savedVol*100}%,#d8d5cf ${savedVol*100}%)`;

  /* Préchargement */
  if (sessionStorage.getItem('rmm_playing') === '1') rAudio.load();

  function postP(msg) { try { window.parent.postMessage(msg,'*'); } catch(e){} }

  function rFetch() {
    fetch('https://radio.radiomiramira.com/api/nowplaying/radiomiramira')
      .then(r => r.json())
      .then(d => {
        if (!d?.now_playing) return;
        const s      = d.now_playing.song;
        const title  = s.title  || '';
        const artist = s.artist || '';
        const album  = s.album  || '';
        const sub    = [artist, album].filter(Boolean).join(' — ');

        document.getElementById('rTitle').textContent = title || 'En cours...';
        document.getElementById('rSub').textContent   = sub;

        if (s.art && s.art !== rCurrentArt) {
          rCurrentArt = s.art;
          const aw  = document.getElementById('rArtwork');
          let img   = aw.querySelector('img');
          if (!img) { img = document.createElement('img'); aw.appendChild(img); }
          img.src    = s.art;
          img.onload = () => { img.style.display = 'block'; const sv = aw.querySelector('svg'); if(sv) sv.style.display='none'; };
        }

        postP({ type:'RMM_NP', title, artist: sub, art: s.art||'' });
      })
      .catch(() => {});
  }

  function rSetUI(playing) {
    document.getElementById('rIconPlay').style.display  = playing ? 'none' : '';
    document.getElementById('rIconPause').style.display = playing ? '' : 'none';
    rBar.classList.toggle('playing', playing);
    postP({ type:'RMM_STATE', playing });
  }

  function rStart() {
    rAudio.play()
      .then(() => {
        rPlaying = true;
        rSetUI(true);
        rFetch();
        clearInterval(rInterval);
        rInterval = setInterval(rFetch, 5000);
        sessionStorage.setItem('rmm_playing','1');
      })
      .catch(err => {
        /* Mobile autoplay bloqué — on recharge et réessaie */
        rAudio.load();
        rAudio.play()
          .then(() => {
            rPlaying = true;
            rSetUI(true);
            rFetch();
            clearInterval(rInterval);
            rInterval = setInterval(rFetch, 5000);
            sessionStorage.setItem('rmm_playing','1');
          })
          .catch(() => {
            document.getElementById('rTitle').textContent = 'Tap pour écouter';
            sessionStorage.removeItem('rmm_playing');
          });
      });
  }

  function rToggle() {
    if (rPlaying) {
      rAudio.pause();
      rPlaying = false;
      rSetUI(false);
      document.getElementById('rTitle').textContent = 'En pause';
      document.getElementById('rSub').textContent   = '';
      clearInterval(rInterval);
      sessionStorage.removeItem('rmm_playing');
      postP({ type:'RMM_NP', title:'En pause', artist:'', art:'' });
    } else {
      rAudio.load();
      rStart();
    }
  }

  function radioSetVol(v) {
    rAudio.volume = v / 100;
    sessionStorage.setItem('rmm_vol', v/100);
    rSlider.style.background = `linear-gradient(to right,#1a1a1a ${v}%,#d8d5cf ${v}%)`;
    postP({ type:'RMM_VOL', volume: v });
  }

  function radioBarClick(e) {
    if (e.target.closest('#radioPlayBtn') || e.target.closest('.radio-vol-wrap')) return;
    postP({ type:'RMM_OPEN' });
  }

  document.getElementById('radioPlayBtn').addEventListener('click', e => {
    e.stopPropagation();
    rToggle();
  });

  /* Commandes depuis le parent */
  window.addEventListener('message', e => {
    if (e.data?.type === 'RMM_CMD_TOGGLE') rToggle();
    if (e.data?.type === 'RMM_CMD_VOL')    radioSetVol(e.data.volume);
  });

  /* Auto-resume 200ms */
  if (sessionStorage.getItem('rmm_playing') === '1') {
    setTimeout(rStart, 200);
  }
</script>
