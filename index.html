<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 72px;
    overflow: hidden;
    background: transparent;
    font-family: 'Space Mono', monospace;
  }

  /* ─── PLAYER BAR ─── */
  .radio-bar {
    position: relative;
    width: 100%;
    height: 72px;
    background: #fafaf8;
    border-top: 1px solid #e8e6e0;
    display: flex;
    align-items: center;
    padding: 0 32px;
    gap: 0;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.06);
    cursor: pointer;
    z-index: 1;
  }

  .radio-bar::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    opacity: 0.4;
  }

  .radio-section-station {
    display: flex;
    align-items: center;
    gap: 14px;
    min-width: 200px;
  }

  .radio-station-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #c8c4bc;
    flex-shrink: 0;
    transition: background 0.4s;
  }

  .radio-bar.playing .radio-station-dot {
    background: #1a1a1a;
    animation: radio-blink 2.2s ease-in-out infinite;
  }

  @keyframes radio-blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.25; }
  }

  .radio-station-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: #b0aca4;
    text-transform: uppercase;
    line-height: 1;
    margin-bottom: 3px;
  }

  .radio-station-name {
    font-size: 13px;
    font-weight: 700;
    color: #1a1a1a;
    letter-spacing: -0.01em;
    line-height: 1;
  }

  .radio-div {
    width: 1px; height: 32px;
    background: #e4e2dc;
    margin: 0 28px;
    flex-shrink: 0;
  }

  .radio-play-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: #1a1a1a;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    z-index: 2;
    position: relative;
  }

  .radio-play-btn:hover { background: #333; transform: scale(1.06); box-shadow: 0 4px 20px rgba(0,0,0,0.18); }
  .radio-play-btn:active { transform: scale(0.97); }
  .radio-play-btn svg { width: 16px; height: 16px; fill: #fafaf8; }

  .radio-section-live {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 16px;
    min-width: 0;
  }

  .radio-artwork {
    width: 44px; height: 44px;
    border-radius: 4px;
    background: #e8e6e0;
    flex-shrink: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .radio-artwork img { width: 100%; height: 100%; object-fit: cover; }
  .radio-artwork-placeholder svg { width: 20px; height: 20px; fill: #b0aca4; }

  .radio-visualizer {
    display: flex;
    align-items: center;
    gap: 2.5px;
    height: 28px;
    flex-shrink: 0;
  }

  .radio-bar-vis {
    width: 2.5px; height: 4px;
    background: #d8d5cf;
    border-radius: 2px;
    transition: background 0.3s;
  }

  .radio-bar.playing .radio-bar-vis { background: #1a1a1a; }
  .radio-bar.playing .radio-bar-vis:nth-child(1)  { animation: radio-wave 1.0s ease-in-out infinite 0.00s; }
  .radio-bar.playing .radio-bar-vis:nth-child(2)  { animation: radio-wave 0.8s ease-in-out infinite 0.11s; }
  .radio-bar.playing .radio-bar-vis:nth-child(3)  { animation: radio-wave 1.2s ease-in-out infinite 0.05s; }
  .radio-bar.playing .radio-bar-vis:nth-child(4)  { animation: radio-wave 0.9s ease-in-out infinite 0.22s; }
  .radio-bar.playing .radio-bar-vis:nth-child(5)  { animation: radio-wave 1.1s ease-in-out infinite 0.15s; }
  .radio-bar.playing .radio-bar-vis:nth-child(6)  { animation: radio-wave 0.7s ease-in-out infinite 0.30s; }
  .radio-bar.playing .radio-bar-vis:nth-child(7)  { animation: radio-wave 1.3s ease-in-out infinite 0.08s; }
  .radio-bar.playing .radio-bar-vis:nth-child(8)  { animation: radio-wave 1.0s ease-in-out infinite 0.25s; }
  .radio-bar.playing .radio-bar-vis:nth-child(9)  { animation: radio-wave 0.8s ease-in-out infinite 0.13s; }
  .radio-bar.playing .radio-bar-vis:nth-child(10) { animation: radio-wave 1.2s ease-in-out infinite 0.35s; }
  .radio-bar.playing .radio-bar-vis:nth-child(11) { animation: radio-wave 0.9s ease-in-out infinite 0.04s; }
  .radio-bar.playing .radio-bar-vis:nth-child(12) { animation: radio-wave 1.1s ease-in-out infinite 0.19s; }
  .radio-bar.playing .radio-bar-vis:nth-child(13) { animation: radio-wave 0.7s ease-in-out infinite 0.28s; }
  .radio-bar.playing .radio-bar-vis:nth-child(14) { animation: radio-wave 1.4s ease-in-out infinite 0.07s; }
  .radio-bar.playing .radio-bar-vis:nth-child(15) { animation: radio-wave 1.0s ease-in-out infinite 0.21s; }

  @keyframes radio-wave {
    0%, 100% { height: 3px; }
    50% { height: 22px; }
  }

  .radio-np-wrap { min-width: 0; }

  .radio-np-label {
    font-size: 9px;
    letter-spacing: 0.18em;
    color: #b0aca4;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .radio-np-title {
    font-size: 12px;
    font-weight: 700;
    color: #1a1a1a;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .radio-np-sub {
    font-size: 11px;
    color: #888480;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .radio-expand-hint {
    font-size: 9px;
    letter-spacing: 0.15em;
    color: #c8c4bc;
    text-transform: uppercase;
    flex-shrink: 0;
    margin-right: 4px;
  }

  .radio-chevron {
    width: 20px; height: 20px;
    flex-shrink: 0;
    fill: none;
    stroke: #c8c4bc;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: stroke 0.2s, transform 0.3s;
  }

  .radio-bar:hover .radio-chevron { stroke: #1a1a1a; }

  .radio-section-volume {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 160px;
  }

  .radio-vol-icon svg { width: 15px; height: 15px; fill: #b0aca4; display: block; }

  .radio-vol-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 110px; height: 2px;
    background: linear-gradient(to right, #1a1a1a 80%, #d8d5cf 80%);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  .radio-vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #1a1a1a;
    cursor: pointer;
    transition: transform 0.15s;
  }

  .radio-vol-slider::-webkit-slider-thumb:hover { transform: scale(1.4); }

  .radio-live-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #f0ede8;
    border: 1px solid #e4e2dc;
    border-radius: 100px;
    padding: 5px 12px;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.4s, transform 0.4s;
    flex-shrink: 0;
  }

  .radio-bar.playing .radio-live-pill { opacity: 1; transform: translateY(0); }

  .radio-live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #1a1a1a;
    animation: radio-blink 2s ease-in-out infinite;
  }

  .radio-live-text {
    font-size: 9px;
    letter-spacing: 0.15em;
    color: #1a1a1a;
    text-transform: uppercase;
  }

  /* ─── FULLSCREEN OVERLAY ─── */
  #radioOverlay {
    position: fixed;
    inset: 0;
    z-index: 99999;
    background: #0e0e0c;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
    overflow: hidden;
  }

  #radioOverlay.open {
    opacity: 1;
    pointer-events: all;
  }

  /* Fond flou avec la pochette */
  #radioBgBlur {
    position: absolute;
    inset: -40px;
    background-size: cover;
    background-position: center;
    filter: blur(60px) brightness(0.3) saturate(1.4);
    transition: background-image 0.8s ease;
    z-index: 0;
  }

  .radio-overlay-inner {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    width: 100%;
    max-width: 420px;
    padding: 0 32px;
  }

  /* Pochette grande */
  #radioFullArtwork {
    width: 280px;
    height: 280px;
    border-radius: 12px;
    background: #2a2a28;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    flex-shrink: 0;
    transition: transform 0.4s ease;
  }

  #radioFullArtwork img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
  }

  #radioFullArtwork svg {
    width: 60px; height: 60px;
    fill: #444;
  }

  #radioOverlay.playing #radioFullArtwork {
    transform: scale(1.03);
  }

  /* Infos morceau */
  .radio-full-info {
    text-align: center;
    width: 100%;
  }

  .radio-full-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .radio-full-title {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    line-height: 1.2;
    margin-bottom: 6px;
    letter-spacing: -0.02em;
  }

  .radio-full-artist {
    font-size: 13px;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.02em;
  }

  /* Contrôles plein écran */
  .radio-full-controls {
    display: flex;
    align-items: center;
    gap: 32px;
    width: 100%;
    justify-content: center;
  }

  .radio-full-play-btn {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: #fff;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s, background 0.2s;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .radio-full-play-btn:hover { transform: scale(1.08); background: #f0ede8; }
  .radio-full-play-btn:active { transform: scale(0.96); }
  .radio-full-play-btn svg { width: 24px; height: 24px; fill: #1a1a1a; }

  /* Volume plein écran */
  .radio-full-volume {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
  }

  .radio-full-volume svg { width: 16px; height: 16px; fill: rgba(255,255,255,0.4); flex-shrink: 0; }

  .radio-full-vol-slider {
    -webkit-appearance: none;
    appearance: none;
    flex: 1;
    height: 3px;
    background: linear-gradient(to right, rgba(255,255,255,0.8) 80%, rgba(255,255,255,0.15) 80%);
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }

  .radio-full-vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
    transition: transform 0.15s;
  }

  .radio-full-vol-slider::-webkit-slider-thumb:hover { transform: scale(1.3); }

  /* Bouton fermer */
  #radioCloseBtn {
    position: absolute;
    top: 28px;
    right: 28px;
    width: 40px; height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    z-index: 2;
  }

  #radioCloseBtn:hover { background: rgba(255,255,255,0.2); }
  #radioCloseBtn svg { width: 16px; height: 16px; stroke: #fff; stroke-width: 2; stroke-linecap: round; fill: none; }

  /* Visualizer plein écran */
  .radio-full-vis {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 24px;
  }

  .radio-full-vis-bar {
    width: 3px; height: 4px;
    background: rgba(255,255,255,0.3);
    border-radius: 2px;
  }

  #radioOverlay.playing .radio-full-vis-bar { background: rgba(255,255,255,0.7); }
  #radioOverlay.playing .radio-full-vis-bar:nth-child(1)  { animation: radio-wave 1.0s ease-in-out infinite 0.00s; }
  #radioOverlay.playing .radio-full-vis-bar:nth-child(2)  { animation: radio-wave 0.8s ease-in-out infinite 0.11s; }
  #radioOverlay.playing .radio-full-vis-bar:nth-child(3)  { animation: radio-wave 1.2s ease-in-out infinite 0.05s; }
  #radioOverlay.playing .radio-full-vis-bar:nth-child(4)  { animation: radio-wave 0.9s ease-in-out infinite 0.22s; }
  #radioOverlay.playing .radio-full-vis-bar:nth-child(5)  { animation: radio-wave 1.1s ease-in-out infinite 0.15s; }
  #radioOverlay.playing .radio-full-vis-bar:nth-child(6)  { animation: radio-wave 0.7s ease-in-out infinite 0.30s; }
  #radioOverlay.playing .radio-full-vis-bar:nth-child(7)  { animation: radio-wave 1.3s ease-in-out infinite 0.08s; }
  #radioOverlay.playing .radio-full-vis-bar:nth-child(8)  { animation: radio-wave 1.0s ease-in-out infinite 0.25s; }

  @media (max-width: 640px) {
    .radio-bar { padding: 0 16px; height: 64px; }
    .radio-div { margin: 0 16px; }
    .radio-section-station { min-width: 120px; }
    .radio-section-volume { display: none; }
    .radio-live-pill { display: none; }
    .radio-visualizer { display: none; }
    .radio-artwork { width: 36px; height: 36px; }
    .radio-expand-hint { display: none; }
    #radioFullArtwork { width: 220px; height: 220px; }
    .radio-full-title { font-size: 16px; }
  }
</style>

<!-- ─── PLAYER BAR ─── -->
<div class="radio-bar" id="radioBar" onclick="radioHandleBarClick(event)">
  <div class="radio-section-station">
    <div class="radio-station-dot"></div>
    <div>
      <div class="radio-station-label">Radio</div>
      <div class="radio-station-name">Radio MiraMira</div>
    </div>
  </div>

  <div class="radio-div"></div>

  <button class="radio-play-btn" id="radioPlayBtn" aria-label="Play / Pause">
    <svg id="radioIconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    <svg id="radioIconPause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>

  <div class="radio-div"></div>

  <div class="radio-section-live">

        <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>

    <div class="radio-visualizer" id="radioVisualizer"></div>

  <div class="radio-live-pill">

  <span class="radio-expand-hint">Ouvrir</span>

      <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>

<div id="radioOverlay">

  <button id="radioCloseBtn" onclick="radioCloseOverlay()">

    </div>

    <div class="radio-full-info">
      <div class="radio-full-label">À l'antenne — Radio MiraMira</div>

        <svg id="radioFullIconPause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>

    <div class="radio-full-volume">
      <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>

  </div>
</div>

<audio id="radioAudio" preload="auto">
  <source src="https://radio.radiomiramira.com/listen/radiomiramira/radio.mp3" type="audio/mpeg">
</audio>

<script>
  /* ── Visualizers ── */
  const radioVis = document.getElementById('radioVisualizer');
  for (let i = 0; i < 15; i++) {
    const b = document.createElement('div'); b.className = 'radio-bar-vis'; radioVis.appendChild(b);
  }
  const radioFullVis = document.getElementById('radioFullVis');
  for (let i = 0; i < 8; i++) {
    const b = document.createElement('div'); b.className = 'radio-full-vis-bar'; radioFullVis.appendChild(b);
  }

  const radioAudio    = document.getElementById('radioAudio');
  const radioBar      = document.getElementById('radioBar');
  const radioOverlay  = document.getElementById('radioOverlay');
  let radioPlaying    = false;
  let radioNpInterval = null;
  let radioCurrentArt = '';

  /* ── Volume restore ── */
  const savedVol = parseFloat(sessionStorage.getItem('radio_volume') || '0.8');
  radioAudio.volume = savedVol;
  document.getElementById('radioVolSlider').value     = savedVol * 100;
  document.getElementById('radioFullVolSlider').value = savedVol * 100;
  const volPct = savedVol * 100;
  document.getElementById('radioVolSlider').style.background =
    `linear-gradient(to right, #1a1a1a ${volPct}%, #d8d5cf ${volPct}%)`;
  document.getElementById('radioFullVolSlider').style.background =
    `linear-gradient(to right, rgba(255,255,255,0.8) ${volPct}%, rgba(255,255,255,0.15) ${volPct}%)`;

  /* ── Préchargement immédiat ── */
  if (sessionStorage.getItem('radio_playing') === '1') radioAudio.load();

  /* ── Now Playing — refresh toutes les 5 secondes ── */
  function radioFetchNowPlaying() {
    fetch('https://radio.radiomiramira.com/api/nowplaying/radiomiramira')
      .then(r => r.json())
      .then(data => {
        if (!data || !data.now_playing) return;
        const song   = data.now_playing.song;
        const title  = song.title  || '';
        const artist = song.artist || '';
        const album  = song.album  || '';
        const sub    = [artist, album].filter(Boolean).join(' — ');

        document.getElementById('radioNpTitle').textContent   = title || 'En cours...';
        document.getElementById('radioNpSub').textContent     = sub;
        document.getElementById('radioFullTitle').textContent  = title || '—';
        document.getElementById('radioFullArtist').textContent = sub;

        if (song.art && song.art !== radioCurrentArt) {
          radioCurrentArt = song.art;

          /* Pochette mini */
          const artwork     = document.getElementById('radioArtwork');
          const placeholder = document.getElementById('radioArtworkPlaceholder');
          let img = artwork.querySelector('img');
          if (!img) { img = document.createElement('img'); artwork.appendChild(img); }
          img.src = song.art;
          img.onload  = () => { if (placeholder) placeholder.style.display = 'none'; };
          img.onerror = () => { if (placeholder) placeholder.style.display = ''; };

          /* Pochette grande */
          const fullArt = document.getElementById('radioFullArtwork');
          let fullImg = fullArt.querySelector('img');
          if (!fullImg) {
            fullImg = document.createElement('img');
            fullArt.appendChild(fullImg);
          }
          fullImg.src = song.art;
          fullImg.onload = () => {
            fullImg.style.display = 'block';
            fullArt.querySelector('svg') && (fullArt.querySelector('svg').style.display = 'none');
            document.getElementById('radioBgBlur').style.backgroundImage = `url('${song.art}')`;
          };
        }
      })
      .catch(() => {});
  }

  function radioUpdatePlayUI(playing) {
    document.getElementById('radioIconPlay').style.display      = playing ? 'none' : '';
    document.getElementById('radioIconPause').style.display     = playing ? '' : 'none';
    document.getElementById('radioFullIconPlay').style.display  = playing ? 'none' : '';
    document.getElementById('radioFullIconPause').style.display = playing ? '' : 'none';
    radioBar.classList.toggle('playing', playing);
    radioOverlay.classList.toggle('playing', playing);
  }

  function radioStartPlaying() {
    radioAudio.play().then(() => {
      radioPlaying = true;
      radioUpdatePlayUI(true);
      radioFetchNowPlaying();
      clearInterval(radioNpInterval);
      radioNpInterval = setInterval(radioFetchNowPlaying, 5000);
      sessionStorage.setItem('radio_playing', '1');
    }).catch(() => {
      radioAudio.load();
      radioAudio.play().then(() => {
        radioPlaying = true;
        radioUpdatePlayUI(true);
        radioFetchNowPlaying();
        clearInterval(radioNpInterval);
        radioNpInterval = setInterval(radioFetchNowPlaying, 5000);
        sessionStorage.setItem('radio_playing', '1');
      }).catch(() => {
        document.getElementById('radioNpTitle').textContent  = '⚠️ Stream indisponible';
        document.getElementById('radioFullTitle').textContent = '⚠️ Stream indisponible';
        sessionStorage.removeItem('radio_playing');
      });
    });
  }

  function radioTogglePlay() {
    if (radioPlaying) {
      radioAudio.pause();
      radioPlaying = false;
      radioUpdatePlayUI(false);
      document.getElementById('radioNpTitle').textContent  = 'En pause';
      document.getElementById('radioFullTitle').textContent = 'En pause';
      document.getElementById('radioNpSub').textContent    = '';
      document.getElementById('radioFullArtist').textContent = '';
      clearInterval(radioNpInterval);
      sessionStorage.removeItem('radio_playing');
    } else {
      radioAudio.load();
      radioStartPlaying();
    }
  }

  function radioSetVolume(v) {
    radioAudio.volume = v / 100;
    sessionStorage.setItem('radio_volume', v / 100);
    document.getElementById('radioVolSlider').value     = v;
    document.getElementById('radioFullVolSlider').value = v;
    document.getElementById('radioVolSlider').style.background =
      `linear-gradient(to right, #1a1a1a ${v}%, #d8d5cf ${v}%)`;
    document.getElementById('radioFullVolSlider').style.background =
      `linear-gradient(to right, rgba(255,255,255,0.8) ${v}%, rgba(255,255,255,0.15) ${v}%)`;
  }

  /* ── Overlay ── */
  function radioOpenOverlay() {
    document.documentElement.style.height = '100vh';
    document.body.style.height = '100vh';
    radioOverlay.classList.add('open');
  }

  function radioCloseOverlay() {
    radioOverlay.classList.remove('open');
    document.documentElement.style.height = '';
    document.body.style.height = '';
  }

  function radioHandleBarClick(e) {
    /* Ignore clic sur le bouton play et le volume */
    if (e.target.closest('#radioPlayBtn') || e.target.closest('.radio-section-volume')) return;
    radioOpenOverlay();
  }

  /* Bouton play de la bar (sans ouvrir l'overlay) */
  document.getElementById('radioPlayBtn').addEventListener('click', function(e) {
    e.stopPropagation();
    radioTogglePlay();
  });

  /* Fermer avec Escape */
  document.addEventListener('keydown', e => { if (e.key === 'Escape') radioCloseOverlay(); });

  /* ── Auto-resume à 200ms ── */
  if (sessionStorage.getItem('radio_playing') === '1') {
    setTimeout(radioStartPlaying, 200);
  }
</script>
